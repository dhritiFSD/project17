<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
#slider{                                             /* Main slider container */
width:400px;                                         /* Slider width */
margin:auto;                                         /* Center slider horizontally */
text-align:center;                                   /* Center content inside */
}

img{                                                 /* Image styling */
width:400px;                                         /* Image width */
height:250px;                                        /* Image height */
object-fit:cover;                                    /* Prevent image distortion */
}

button{                                              /* Button styling */
margin:10px;                                         /* Space around buttons */
padding:8px 15px;                                    /* Button padding */
cursor:pointer;                                      /* Pointer cursor on hover */
}
</style>
</head>
<body>
    <div id="slider">                                    <!-- Slider container -->

<button id="prev">Prev</button>                      <!-- Previous image button -->

<img id="image" src="">                              <!-- Image element where slider images appear -->

<button id="next">Next</button>   
<script src="silder.js"></script>                   <!-- Next image button -->

</div>
</body>
</html>
